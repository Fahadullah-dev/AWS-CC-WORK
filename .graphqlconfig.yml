projects:
  cloudpassport:
    schemaPath: amplify/backend/api/cloudpassport/build/schema.graphql
    includes:
      - cloud-passport/src/graphql/**/*.js
    excludes:
      - ./amplify/**
    extensions:
      amplify:
        codeGenTarget: javascript
        generatedFileName: ''
        docsFilePath: cloud-passport/src/graphql
extensions:
  amplify:
    version: 3
