# amplify/backend/api/cloudpassport/schema.graphql

type User @model @auth(rules: [{allow: public}]) {
  id: ID!
  email: String!
  full_name: String!
  member_id: String!
  public_slug: String
  xp: Int!
  tier: String!
  avatar_url: String
}

type Event @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  track: String!
  xp_reward: Int!
  emoji: String
}

type Attendance @model @auth(rules: [{allow: public}]) {
  id: ID!
  userID: ID! @index(name: "byUser")
  eventID: ID! @index(name: "byEvent")
  timestamp: AWSDateTime
}